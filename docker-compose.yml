version: "3.8"

services:
  flask-api:
    build:
      context: ./pmis-backend
      dockerfile: Dockerfile
    container_name: pmis-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      # Use absolute path inside container so config.py and seed script agree
      - DATABASE_URL=sqlite:////app/pmis.db
      - SECRET_KEY=super-secret-key
    volumes:
      # Persist the SQLite DB between container restarts
      - pmis_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./pmis-frontend
      dockerfile: Dockerfile
    container_name: pmis-frontend
    ports:
      - "5173:80"
    depends_on:
      - flask-api
    restart: unless-stopped

volumes:
  pmis_db:
